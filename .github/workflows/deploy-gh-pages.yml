name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build -- --configuration production --base-href /Portfolio/

      - name: Rename index.csr.html to index.html (Angular SSR adjustment)
        run: mv dist/browser/index.csr.html dist/browser/index.html

      - name: Rename index.csr.html to index.html (Angular SSR adjustment)
        run: mv dist/browser/index.csr.html dist/browser/index.html

      - name: Create 404.html
        run: cp dist/browser/index.html dist/browser/404.html

      - name: Add .nojekyll
        run: touch dist/browser/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/browser
