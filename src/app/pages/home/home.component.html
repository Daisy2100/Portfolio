<section class="home-hero relative min-h-screen text-white flex flex-col pt-[12vh] lg:pt-[15vh]">
    <main
        class="relative z-10 w-full mx-auto max-w-6xl px-6 flex-1 flex flex-col justify-between pb-[15vh] lg:pb-[22vh]">
        <!-- Top: Text Content -->
        <div class="animate-fade-in-up max-w-5xl">

            <div class="border-l border-white/18 pl-5 md:pl-7">

                <h1 class="max-w-4xl text-5xl font-semibold leading-[0.95] tracking-tight text-white md:text-7xl">
                    Senior Frontend Engineer
                </h1>

                <p class="mt-7 max-w-2xl text-base leading-8 text-white/68 md:text-lg">
                    具 {{ experienceYears }}+ 年企業內部系統與平台開發經驗，主力於前端架構、權限流程、API 串接與系統整合。熟悉 Angular、Vue、TypeScript、Node.js、.NET 8、OAuth/JWT、Docker 與 GitHub Actions。
                </p>
            </div>

        </div>

        <!-- Bottom: Primary Actions -->
        <div class="w-full animate-fade-in-up mt-auto" style="animation-delay: 0.2s;">
            <div class="flex flex-wrap items-center gap-4">
                <a routerLink="/work"
                    class="group inline-flex items-center justify-center gap-2 rounded-full bg-teal-400 px-6 py-3.5 text-sm font-bold text-slate-950 shadow-lg shadow-teal-500/20 transition hover:-translate-y-0.5 hover:bg-teal-300 hover:shadow-teal-400/30 focus:outline-none focus:ring-2 focus:ring-teal-200 focus:ring-offset-2 focus:ring-offset-slate-950">
                    View Works
                    <i class="pi pi-arrow-right text-xs transition group-hover:translate-x-1"></i>
                </a>
                <a routerLink="/about"
                    class="inline-flex items-center justify-center gap-2 rounded-full border border-white/45 bg-white/10 px-6 py-3.5 text-sm font-bold text-white shadow-lg shadow-black/10 transition hover:-translate-y-0.5 hover:border-white/70 hover:bg-white/16 focus:outline-none focus:ring-2 focus:ring-white/70 focus:ring-offset-2 focus:ring-offset-slate-950">
                    About Me
                </a>
            </div>
        </div>
    </main>
</section>

<!-- 閃爍動畫元件 -->
<app-flash-animation></app-flash-animation>

<!-- 技能 -->
<app-skills [skills]="skills"></app-skills>

<!-- 工作經歷區域 -->
<app-experience [workExperience]="workExperience"></app-experience>

<!-- 閃爍動畫元件 -->
<app-flash-animation></app-flash-animation>

<!-- 學歷區域 -->
<app-education [education]="education"></app-education>
