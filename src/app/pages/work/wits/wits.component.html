<div class="wits-container">

    <!-- Header Section -->
    <div class="pt-20 pb-8 text-center animate-fade-in-up">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-4xl font-bold text-white mb-4">{{ companyInfo.name }}</h1>

            <div class="flex flex-wrap gap-3 text-center justify-center mb-6">
                <p-tag [value]="companyInfo.role" [style]="{'background-color': companyInfo.color}"
                    class="font-medium"></p-tag>
                <p-tag value="{{ companyInfo.duration }}" severity="info" class="font-medium"></p-tag>
                <p-tag value="{{ companyInfo.period }}" severity="secondary" class="font-medium"></p-tag>
            </div>
        </div>
    </div>

    <!-- 職涯時間軸 -->
    <section class="timeline-section py-16">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold text-center text-white mb-12 animate-fade-in-up">
                職涯時間軸
            </h2>

            <div class="max-w-4xl mx-auto animate-fade-in-up">
                <p-timeline
                    [value]="timelineEvents"
                    layout="vertical"
                    align="alternate"
                    styleClass="timeline-custom"
                >
                    <ng-template pTemplate="marker" let-event>
                        <div class="timeline-marker" [style.background-color]="event.color">
                            <i [class]="event.icon" class="text-white"></i>
                        </div>
                    </ng-template>

                    <ng-template pTemplate="content" let-event>
                        <div class="timeline-content">
                            <div class="bg-white p-4 rounded-lg shadow-md">
                                <h4 class="font-bold text-gray-800 mb-2">{{ event.title }}</h4>
                                <p class="text-gray-600 text-sm mb-1">{{ event.description }}</p>
                                <p class="text-gray-500 text-xs">{{ event.date }}</p>
                            </div>
                        </div>
                    </ng-template>
                </p-timeline>
            </div>
        </div>
    </section>

    <!-- 專案詳細內容 -->
    <section class="projects-section py-16" *ngIf="projects.length > 0">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl font-bold text-center text-white mb-12" pAnimateOnScroll enterClass="animate-fade-in-up">
                專案經驗
            </h2>

            <div class="max-w-4xl mx-auto">
                <div
                    *ngFor="let project of projects; trackBy: trackByProjectName; let i = index"
                    class="project-card mb-8"
                    pAnimateOnScroll
                    enterClass="animate-fade-in-up"
                >
                    <p-card styleClass="shadow-lg hover:shadow-xl transition-all duration-300 border-0">
                        <ng-template pTemplate="header">
                            <div class="project-header p-6 pb-0">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="flex items-center">
                                        <i [class]="project.icon" class="text-3xl mr-4 text-indigo-500"></i>
                                        <div>
                                            <h3 class="text-2xl font-bold text-gray-800 mb-1">{{ project.name }}</h3>
                                            <p class="text-gray-500 text-sm">{{ project.period }}</p>
                                        </div>
                                    </div>
                                    <p-tag
                                        [value]="project.status"
                                        [severity]="getStatusSeverity(project.status)"
                                    ></p-tag>
                                </div>
                            </div>
                        </ng-template>

                        <div class="project-content px-6 pb-6">
                            <div class="mb-6">
                                <h4 class="text-lg font-semibold text-gray-700 mb-3">專案描述</h4>
                                <p class="text-gray-600 leading-relaxed">{{ project.description }}</p>
                            </div>

                            <div class="mb-6">
                                <h4 class="text-lg font-semibold text-gray-700 mb-3">主要工作內容</h4>
                                <ul class="list-disc list-inside space-y-2">
                                    <li *ngFor="let responsibility of project.responsibilities"
                                        class="text-gray-600">
                                        {{ responsibility }}
                                    </li>
                                </ul>
                            </div>

                            <div class="mb-6">
                                <h4 class="text-lg font-semibold text-gray-700 mb-3">使用技術</h4>
                                <div class="flex flex-wrap gap-2">
                                    <span
                                        *ngFor="let tech of project.technologies.frontend"
                                        class="inline-block bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium"
                                    >
                                        {{ tech }}
                                    </span>
                                    <span
                                        *ngFor="let tech of project.technologies.backend"
                                        class="inline-block bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-sm font-medium"
                                    >
                                        {{ tech }}
                                    </span>
                                    <span
                                        *ngFor="let tech of project.technologies.database"
                                        class="inline-block bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm font-medium"
                                    >
                                        {{ tech }}
                                    </span>
                                </div>
                            </div>

                            <div class="achievements-section" *ngIf="project.achievements && project.achievements.length > 0">
                                <h4 class="text-lg font-semibold text-gray-700 mb-3">主要成果</h4>
                                <ul class="list-disc list-inside space-y-2">
                                    <li *ngFor="let achievement of project.achievements"
                                        class="text-gray-600">
                                        {{ achievement }}
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </p-card>
                </div>
            </div>
        </div>
    </section>

</div>
